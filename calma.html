<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calma — read well</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0A0908; color: #E8E5DD; }
    body { font-family: "Spectral", Georgia, serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; }

    /* Selection color */
    ::selection { background: rgba(201,168,118,0.28); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(232,229,221,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(232,229,221,0.18); }

    /* App shell */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px; flex-shrink: 0; height: 100%;
      background: #080706; border-right: 1px solid rgba(232,229,221,0.06);
      display: flex; flex-direction: column; padding: 32px 0 24px;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 24px 32px; font-size: 28px; line-height: 1;
      font-weight: 600; letter-spacing: -0.5px; color: #E8E5DD;
    }
    .sidebar-logo span { color: #C9A876; }
    .sidebar-section { padding: 0 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 6px; cursor: pointer;
      font-size: 14.5px; color: #5E5B55; border: none; background: transparent;
      width: 100%; text-align: left; transition: color 150ms, background 150ms;
      font-family: "Spectral", Georgia, serif; letter-spacing: 0.1px;
    }
    .nav-item:hover { color: #9A958C; background: rgba(232,229,221,0.04); }
    .nav-item.active { color: #E8E5DD; background: rgba(232,229,221,0.07); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-divider { height: 1px; background: rgba(232,229,221,0.06); margin: 16px 12px; }
    .sidebar-bottom { padding: 0 12px; }
    .add-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 6px; cursor: pointer;
      font-size: 14px; color: #C9A876; border: 1px solid rgba(201,168,118,0.2);
      background: rgba(201,168,118,0.05); width: 100%; text-align: left;
      font-family: "Spectral", Georgia, serif; transition: all 150ms;
    }
    .add-btn:hover { background: rgba(201,168,118,0.1); border-color: rgba(201,168,118,0.3); }

    /* Main content area */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .scroll-area { flex: 1; overflow-y: auto; }

    /* Library layout */
    .library-inner { max-width: 720px; margin: 0 auto; padding: 48px 40px 80px; }
    .view-label { font-size: 10px; letter-spacing: 2.8px; color: #5E5B55; text-transform: uppercase; margin-bottom: 8px; }
    .view-title { font-size: 38px; font-weight: 600; letter-spacing: -0.6px; color: #E8E5DD; line-height: 1.05; }
    .view-meta { font-size: 14px; color: #5E5B55; margin-top: 10px; font-style: italic; }

    /* Continue reading card */
    .continue-card {
      margin: 32px 0; padding: 24px 28px;
      background: #0F0E0D; border: 1px solid rgba(232,229,221,0.08);
      border-radius: 4px; cursor: pointer; display: block; text-align: left;
      width: 100%; color: inherit; font-family: inherit; transition: border-color 150ms;
    }
    .continue-card:hover { border-color: rgba(232,229,221,0.15); }
    .continue-label { display: flex; align-items: center; gap: 8px; color: #C9A876; margin-bottom: 16px; }
    .continue-label span { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; }
    .continue-title { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.15; margin-bottom: 8px; }
    .continue-byline { font-size: 13px; color: #5E5B55; font-style: italic; margin-bottom: 20px; }
    .progress-track { height: 1px; background: rgba(232,229,221,0.1); position: relative; }
    .progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #C9A876; transition: width 300ms; }
    .progress-pct { font-size: 11px; color: #5E5B55; margin-top: 6px; letter-spacing: 0.3px; font-variant-numeric: tabular-nums; }

    /* Section header */
    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .section-label { font-size: 10px; letter-spacing: 2px; color: #5E5B55; text-transform: uppercase; }
    .section-count { font-size: 12px; color: #3D3A35; font-style: italic; }

    /* Article rows */
    .article-list { border-top: 1px solid rgba(232,229,221,0.06); }
    .article-row {
      display: block; width: 100%; text-align: left; background: transparent;
      border: none; border-bottom: 1px solid rgba(232,229,221,0.06);
      padding: 22px 0; cursor: pointer; color: inherit; font-family: inherit;
      transition: background 120ms;
    }
    .article-row:hover { background: rgba(232,229,221,0.02); }
    .article-row-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .article-pub { font-size: 10px; letter-spacing: 1.4px; color: #C9A876; text-transform: uppercase; }
    .article-meta { font-size: 11px; color: #3D3A35; font-variant-numeric: tabular-nums; }
    .article-title { font-size: 21px; font-weight: 600; letter-spacing: -0.2px; line-height: 1.2; margin-bottom: 8px; color: #E8E5DD; }
    .article-excerpt { font-size: 14.5px; line-height: 1.5; color: #5E5B55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-author { margin-top: 10px; font-size: 12px; color: #3D3A35; font-style: italic; }
    .article-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .article-progress-track { flex: 1; height: 1px; background: rgba(232,229,221,0.08); position: relative; }
    .article-read-badge { font-size: 10px; color: #8FA382; letter-spacing: 0.5px; }

    /* Reader */
    .reader-wrap { position: relative; min-height: 100%; }
    .reader-topbar {
      position: sticky; top: 0; z-index: 50;
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,9,8,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232,229,221,0.06);
    }
    .reader-topbar-back {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: none; color: #5E5B55; cursor: pointer;
      font-family: "Spectral", Georgia, serif; font-size: 14px; font-style: italic;
      padding: 4px 8px 4px 0; transition: color 150ms;
    }
    .reader-topbar-back:hover { color: #9A958C; }
    .reader-pub { font-size: 10px; letter-spacing: 1.8px; color: #3D3A35; text-transform: uppercase; }
    .reader-topbar-actions { display: flex; align-items: center; gap: 4px; }
    .icon-btn {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: #5E5B55; cursor: pointer;
      border-radius: 6px; transition: color 150ms, background 150ms;
    }
    .icon-btn:hover { color: #9A958C; background: rgba(232,229,221,0.06); }
    .icon-btn.active { color: #E8E5DD; background: rgba(232,229,221,0.08); }
    .reader-progress-bar { height: 1px; background: rgba(232,229,221,0.08); position: sticky; top: 52px; z-index: 49; }
    .reader-progress-fill { height: 100%; background: #C9A876; transition: width 100ms; }
    .reader-col { max-width: 660px; margin: 0 auto; padding: 56px 40px 120px; }
    .article-h1 { font-size: 36px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.12; color: #E8E5DD; margin-bottom: 16px; }
    .article-byline { margin-bottom: 40px; }
    .article-byline-name { font-size: 15px; font-style: italic; color: #9A958C; margin-bottom: 6px; }
    .article-byline-meta { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 1.5px; color: #3D3A35; text-transform: uppercase; }
    .article-byline-dot { width: 3px; height: 3px; border-radius: 50%; background: #3D3A35; }
    .article-ornament { display: flex; align-items: center; gap: 12px; margin: 24px 0 0; color: #3D3A35; }
    .article-ornament-line { flex: 1; height: 1px; background: rgba(232,229,221,0.06); }
    .article-ornament-glyph { font-size: 16px; color: #3D3A35; }
    .article-h2 { font-size: 19px; font-weight: 600; font-style: italic; letter-spacing: 0; line-height: 1.3; color: #E8E5DD; margin: 36px 0 16px; }
    .article-p { font-size: 19px; line-height: 1.78; color: #E8E5DD; margin-bottom: 24px; letter-spacing: 0.08px; cursor: text; }
    .article-end { text-align: center; color: #3D3A35; font-size: 18px; margin: 48px 0 24px; }
    .article-source { text-align: center; font-size: 13px; color: #3D3A35; font-style: italic; }

    /* Highlights */
    mark { background: none; border-radius: 1px; }
    mark.hl-ochre { background: rgba(201,168,118,0.18); box-shadow: inset 0 -1.5px 0 #C9A876; color: inherit; }
    mark.hl-sage { background: rgba(143,163,130,0.18); box-shadow: inset 0 -1.5px 0 #8FA382; color: inherit; }
    mark.hl-rose { background: rgba(194,138,138,0.18); box-shadow: inset 0 -1.5px 0 #C28A8A; color: inherit; }
    mark.hl-blue { background: rgba(127,149,173,0.18); box-shadow: inset 0 -1.5px 0 #7F95AD; color: inherit; }
    .hl-note-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-left: 3px; vertical-align: super; border: 1.5px solid #0A0908; }
    .hl-ochre .hl-note-dot { background: #C9A876; }
    .hl-sage .hl-note-dot { background: #8FA382; }
    .hl-rose .hl-note-dot { background: #C28A8A; }
    .hl-blue .hl-note-dot { background: #7F95AD; }

    /* Inline note */
    .inline-note { display: flex; align-items: flex-start; gap: 10px; margin: -12px 0 24px; padding-left: 14px; font-size: 14px; line-height: 1.55; color: #5E5B55; font-style: italic; }
    .inline-note-label { font-size: 9px; letter-spacing: 1.4px; text-transform: uppercase; font-style: normal; padding-top: 3px; flex-shrink: 0; }

    /* Selection toolbar */
    .sel-toolbar {
      position: fixed; z-index: 200;
      background: #171614; border: 1px solid rgba(232,229,221,0.14);
      border-radius: 100px; padding: 5px 6px;
      display: flex; align-items: center; gap: 2px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
      transform: translateX(-50%);
      animation: toolbar-pop 140ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes toolbar-pop { from { opacity: 0; transform: translateX(-50%) scale(0.92); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
    .sel-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 12px;
      background: transparent; border: none; color: #E8E5DD; cursor: pointer;
      font-family: "Spectral", Georgia, serif; font-size: 12.5px; letter-spacing: 0.3px;
      border-radius: 100px; transition: background 120ms, color 120ms; white-space: nowrap;
    }
    .sel-btn:hover { background: rgba(232,229,221,0.08); }
    .sel-btn.active { color: #C9A876; }
    .sel-divider { width: 1px; height: 16px; background: rgba(232,229,221,0.1); flex-shrink: 0; }
    .color-row { display: flex; align-items: center; gap: 10px; padding: 7px 12px; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%; border: none; cursor: pointer;
      transition: transform 120ms, box-shadow 120ms; flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { box-shadow: 0 0 0 2px #0A0908, 0 0 0 3.5px var(--swatch-color); }

    /* Note panel */
    .note-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 340px;
      background: #0F0E0D; border-left: 1px solid rgba(232,229,221,0.08);
      display: flex; flex-direction: column; z-index: 100;
      animation: slide-in-right 200ms ease-out;
    }
    @keyframes slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .note-panel-header { padding: 20px 22px 16px; border-bottom: 1px solid rgba(232,229,221,0.06); display: flex; justify-content: space-between; align-items: baseline; }
    .note-panel-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #5E5B55; }
    .note-panel-actions { display: flex; gap: 8px; align-items: center; }
    .note-save-btn { background: transparent; border: none; color: #C9A876; cursor: pointer; font-family: "Spectral", Georgia, serif; font-size: 14px; font-weight: 500; padding: 0; }
    .note-cancel-btn { background: transparent; border: none; color: #5E5B55; cursor: pointer; font-family: "Spectral", Georgia, serif; font-size: 14px; font-style: italic; padding: 0; }
    .note-panel-quote { padding: 16px 22px; border-left: 2px solid; margin: 0 22px 0; border-radius: 0; }
    .note-panel-quote-label { font-size: 9px; letter-spacing: 1.6px; text-transform: uppercase; margin-bottom: 6px; }
    .note-panel-quote-text { font-size: 14px; line-height: 1.5; font-style: italic; color: #5E5B55; }
    .note-textarea-wrap { flex: 1; padding: 0 22px; margin-top: 20px; }
    .note-textarea { width: 100%; height: 100%; background: transparent; border: none; color: #E8E5DD; font-family: "Spectral", Georgia, serif; font-size: 16px; line-height: 1.6; resize: none; outline: none; }
    .note-textarea::placeholder { color: #3D3A35; font-style: italic; }
    .note-panel-footer { padding: 16px 22px; border-top: 1px solid rgba(232,229,221,0.06); }
    .note-color-row { display: flex; align-items: center; gap: 10px; }
    .note-color-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #3D3A35; }
    .note-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .note-tag { padding: 4px 10px; border-radius: 100px; border: 1px solid rgba(232,229,221,0.08); font-size: 11.5px; color: #5E5B55; font-style: italic; }

    /* Reader settings */
    .settings-panel {
      position: fixed; right: 0; top: 52px; width: 260px;
      background: #0F0E0D; border: 1px solid rgba(232,229,221,0.1);
      border-radius: 8px; padding: 6px 0; z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: fade-down 140ms ease-out;
    }
    @keyframes fade-down { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid rgba(232,229,221,0.05); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 14px; color: #9A958C; }
    .settings-val { font-size: 14px; color: #5E5B55; font-style: italic; }
    .settings-stepper { display: flex; gap: 4px; }
    .stepper-btn { width: 28px; height: 26px; background: #0A0908; border: 1px solid rgba(232,229,221,0.1); border-radius: 4px; color: #9A958C; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: serif; }

    /* Marginalia screen */
    .marginalia-inner { max-width: 720px; margin: 0 auto; padding: 48px 40px 80px; }
    .topic-filter { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; margin: 24px 0 32px; }
    .topic-filter::-webkit-scrollbar { display: none; }
    .topic-chip { background: transparent; border: none; font-family: "Spectral", Georgia, serif; font-size: 13.5px; color: #3D3A35; cursor: pointer; padding: 4px 0; border-bottom: 1px solid transparent; white-space: nowrap; font-style: italic; transition: color 150ms; }
    .topic-chip:hover { color: #5E5B55; }
    .topic-chip.active { color: #E8E5DD; border-bottom-color: #C9A876; font-style: normal; }
    .topic-group { margin-bottom: 32px; }
    .topic-group-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .topic-group-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3D3A35; white-space: nowrap; }
    .topic-group-line { flex: 1; height: 1px; background: rgba(232,229,221,0.06); }
    .topic-group-count { font-size: 11px; color: #3D3A35; }
    .hl-card {
      background: #0F0E0D; border: 1px solid rgba(232,229,221,0.07);
      border-radius: 3px; padding: 20px 22px; margin-bottom: 14px;
      cursor: pointer; text-align: left; width: 100%; color: inherit;
      font-family: inherit; transition: border-color 150ms;
      border-left-width: 2px;
    }
    .hl-card:hover { border-color: rgba(232,229,221,0.14); }
    .hl-card-quote { font-size: 17px; line-height: 1.48; font-style: italic; color: #E8E5DD; }
    .hl-card-note { margin-top: 14px; padding-top: 12px; border-top: 1px dashed rgba(232,229,221,0.07); font-size: 14px; line-height: 1.5; color: #5E5B55; }
    .hl-card-note-label { font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; margin-right: 8px; }
    .hl-card-footer { margin-top: 14px; display: flex; align-items: center; gap: 8px; }
    .hl-card-source { font-size: 12px; color: #5E5B55; font-style: italic; }
    .hl-card-when { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #3D3A35; }

    /* Discover screen */
    .discover-inner { max-width: 720px; margin: 0 auto; padding: 48px 40px 80px; }
    .discover-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
    .discover-card {
      background: #0F0E0D; border: 1px solid rgba(232,229,221,0.07);
      border-radius: 3px; padding: 22px; cursor: pointer; text-align: left;
      width: 100%; color: inherit; font-family: inherit; transition: border-color 150ms;
      display: flex; flex-direction: column; min-height: 180px;
    }
    .discover-card:hover { border-color: rgba(232,229,221,0.14); }
    .discover-card-tag { font-size: 9.5px; letter-spacing: 1.6px; color: #C9A876; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .discover-card-tag::before { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: #C9A876; flex-shrink: 0; }
    .discover-card-title { font-size: 18px; font-weight: 600; letter-spacing: -0.1px; line-height: 1.2; margin-bottom: 10px; color: #E8E5DD; }
    .discover-card-excerpt { font-size: 13px; line-height: 1.5; color: #5E5B55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .discover-card-footer { margin-top: 16px; display: flex; justify-content: space-between; font-size: 11.5px; color: #3D3A35; font-style: italic; }

    /* Search screen */
    .search-inner { max-width: 720px; margin: 0 auto; padding: 48px 40px 80px; }
    .search-input-wrap { position: relative; margin-top: 28px; }
    .search-input {
      width: 100%; background: #0F0E0D; border: 1px solid rgba(232,229,221,0.1);
      border-radius: 4px; padding: 14px 18px 14px 44px;
      color: #E8E5DD; font-family: "Spectral", Georgia, serif; font-size: 18px;
      outline: none; transition: border-color 150ms;
    }
    .search-input:focus { border-color: rgba(201,168,118,0.3); }
    .search-input::placeholder { color: #3D3A35; font-style: italic; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #3D3A35; pointer-events: none; }
    .search-results { margin-top: 36px; }
    .search-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3D3A35; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid rgba(232,229,221,0.06); }
    .search-empty { text-align: center; padding: 60px 0; color: #3D3A35; font-size: 16px; font-style: italic; }

    /* Add article modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      animation: fade-in 150ms ease-out;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #0F0E0D; border: 1px solid rgba(232,229,221,0.1);
      border-radius: 8px; padding: 36px; width: 520px; max-width: calc(100vw - 40px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: modal-in 200ms cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    @keyframes modal-in { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
    .modal-subtitle { font-size: 14px; color: #5E5B55; font-style: italic; margin-bottom: 28px; }
    .modal-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3D3A35; margin-bottom: 8px; }
    .modal-input {
      width: 100%; background: #0A0908; border: 1px solid rgba(232,229,221,0.1);
      border-radius: 4px; padding: 12px 16px; color: #E8E5DD;
      font-family: "Spectral", Georgia, serif; font-size: 15px; outline: none;
      transition: border-color 150ms; margin-bottom: 24px;
    }
    .modal-input:focus { border-color: rgba(201,168,118,0.3); }

    domain: 'commonletter.co',
    excerpt: 'Reading well is no longer a default behavior. It is, increasingly, a discipline — closer to gardening than to consumption.',

    body: [
      { kind: 'p', text: 'There was a time, not so long ago, when reading was an unremarkable thing one did with an afternoon. A person sat down, opened a book or unfolded a paper, and that was the end of it. The rest of the world went on without them for an hour, and no one — including the reader — felt the absence as a wound.' },
      { kind: 'p', text: 'What changed is not, I think, the books. The books are mostly fine. The essays are often very good. What changed is the gravity of the room around them. Reading now has to be insisted upon. It happens in spite of, not because of, the surfaces that hold the words.' },
      { kind: 'p', text: 'I have come to think of reading less as a leisure activity and more as a kind of small, daily gardening — something one tends to for its own sake, with the understanding that nothing dramatic will happen on any single afternoon, and that the slow accumulation is the point.' },
      { kind: 'p', text: 'A garden is patient. It is also, importantly, a little inconvenient. You have to go out to it. You have to bend down. The soil gets under your fingernails. None of this is incidental to the pleasure; the bending and the dirt are how the pleasure arrives.' },
      { kind: 'h2', text: 'Friction as feature' },
      { kind: 'p', text: 'For years our designers worked to remove every conceivable friction from the experience of reading on a screen. Tap, scroll, swipe; the words flowed past like water from a tap. The result, predictably, is that they registered like water too — useful, forgettable, gone.' },

      { kind: 'p', text: 'I am thinking of a particular kind of time — what I will call unresolved time. Not leisure exactly, because leisure implies rest from effort, and unresolved time is not rest. It is something more like fermentation: slow, unglamorous, productive in ways that require patience to detect.' },
      { kind: 'p', text: 'The scientist who takes a walk and returns to the problem differently. The writer who watches rain for twenty minutes and finds the sentence she had been looking for. The manager who steps away from the meeting and later, unprompted, has the insight that the meeting was circling. None of these things can be scheduled.' },

      { kind: 'p', text: 'The algorithm worked. It worked in the way that most recommendation systems work: it made you feel seen by showing you versions of yourself you already recognized. Your interests, amplified. Your habits, mirrored back. Your blind spots, faithfully preserved.' },

      { kind: 'p', text: 'I have been thinking about this since leaving that company, and I have come to believe we built a flattering machine. We built something that told you, in article form, what you already knew you believed.' },
      { kind: 'p', text: 'The failure mode of recommendation is mimicry. A system that learns your preferences and faithfully reproduces them will, over time, narrow the kind of mind you can have. Not catastrophically — you will still encounter new information within your established categories. But the categories themselves will harden. The frame will not change.' },
      { kind: 'h2', text: 'Knowing when to be silent' },
      { kind: 'p', text: 'A recommendation engine that genuinely served the reader would have to do something counterintuitive: it would have to occasionally recommend nothing. The reader who is between books is not necessarily underserved. The reader who finishes something difficult and does not know what to read next is in a productive state of suspension. Filling that silence too quickly is not helping; it is preventing something.' },
      { kind: 'p', text: 'What would a patient algorithm look like? It would track not just what you read but how you read it. How long you stayed. Where you stopped. Whether you came back. It would learn the difference between the article you saved because it confirmed something and the article you saved because it troubled you. It would know that trouble is worth more.' },

      { kind: 'p', text: 'I began photographing empty rooms ten years ago because I could not afford furniture and was embarrassed about it. I photographed the rooms so they would seem intentional — a kind of editorial emptiness rather than practical poverty. Later, when I had furniture, I kept photographing them.' },
      { kind: 'p', text: 'The thing about photographing an interior is that you must wait. Not for any particular thing to happen, but for the room to settle into what it actually is. In the morning, a room is performing itself. By mid-afternoon, if you have not bothered it with your intentions, it begins to relax. The light moves, and the room follows the light.' },

      { kind: 'p', text: 'The word idleness carries a charge in our culture that it perhaps does not deserve. To call someone idle is not neutral; it implies waste, abdication, a failure to convert one\'s hours into something countable. But idleness, properly understood, is not the absence of work. It is a different kind of attention — one we have largely forgotten how to maintain.' },

      { kind: 'p', text: 'We have built our entire economy around the eradication of this mode. The smartphone in your pocket exists, at some level, to ensure that you are never again allowed to stare out of that train window without something competing for your gaze. It is not malice; it is simply that idleness is invisible to metrics. It produces nothing that can be counted, and therefore, from the perspective of a system that counts, it does not exist.' },

// ─── HOOKS ────────────────────────────────────────────────────────────────────
function useLocalStorage(key, initial) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = React.useCallback((v) => {
    const next = typeof v === 'function' ? v(val) : v;
    setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  }, [key, val]);
  return [val, set];
}

function useTextSelection(containerRef, enabled = true) {
  const [sel, setSel] = React.useState(null);
  React.useEffect(() => {
    if (!enabled) { setSel(null); return; }
    const onUp = () => {
      const s = window.getSelection();
      if (!s || s.isCollapsed) return;
      const txt = s.toString().trim();
      if (txt.length < 3) return;
      if (!containerRef.current?.contains(s.anchorNode)) return;
      const r = s.getRangeAt(0);
      const rect = r.getBoundingClientRect();
      setSel({ text: txt, rect });
    };
    const onDown = (e) => {
      if (e.target.closest('[data-toolbar]')) return;
      setSel(null);
    };
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
    document.addEventListener('mousedown', onDown);
    return () => {
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchend', onUp);
      document.removeEventListener('mousedown', onDown);
    };
  }, [containerRef, enabled]);
  return [sel, setSel];
}

function InterestsScreen({ onComplete }) {
  const [selected, setSelected] = React.useState([]);
  const [customInterests, setCustomInterests] = React.useState([]);
  const [inputVal, setInputVal] = React.useState('');
  const inputRef = React.useRef(null);

  const toggle = (interest) =>
    setSelected(prev => prev.includes(interest) ? prev.filter(i => i !== interest) : [...prev, interest]);

  const addCustom = () => {
    const val = inputVal.trim();
    if (!val) return;
    const normalized = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
    setCustomInterests(prev => prev.includes(normalized) ? prev : [...prev, normalized]);
    setSelected(prev => prev.includes(normalized) ? prev : [...prev, normalized]);
    setInputVal('');
    inputRef.current?.focus();
  };

  const remaining = Math.max(0, 3 - selected.length);

  return (
    <div className="onboarding" style={{ alignItems: 'flex-start', overflowY: 'auto' }}>
      <div className="onboarding-inner" style={{ maxWidth: 520, paddingTop: 48, minHeight: '100%' }}>
        <div className="onboarding-logo" style={{ marginBottom: 32 }}>Calma<span>.</span></div>
        <div className="onboarding-eyebrow">Your reading life</div>
        <div className="onboarding-title" style={{ fontSize: 30, marginBottom: 8 }}>What do you read?</div>
        <div className="ob-count">
          {selected.length === 0
            ? 'Choose at least 3 to begin'
            : remaining > 0
            ? `${remaining} more to go`
            : `${selected.length} selected — looks good`}
        </div>

        <div className="interests-body">
          {Object.entries(INTEREST_GROUPS).map(([group, interests]) => (
            <div key={group} className="interest-group">
              <div className="interest-group-label">{group}</div>
              <div className="interest-chips">
                {interests.map(interest => (
                  <button
                    key={interest}
                    className={`interest-chip ${selected.includes(interest) ? 'selected' : ''}`}
                    onClick={() => toggle(interest)}
                  >{interest}</button>
                ))}
              </div>
            </div>
          ))}

          {customInterests.length > 0 && (
            <div className="interest-group">
              <div className="interest-group-label">Yours</div>
              <div className="interest-chips">
                {customInterests.map(interest => (
                  <button
                    key={interest}
                    className={`interest-chip ${selected.includes(interest) ? 'selected' : ''}`}
                    onClick={() => toggle(interest)}
                  >{interest}</button>
                ))}
              </div>
            </div>
          )}

          <div className="custom-interest-row">
            <input
              ref={inputRef}
              className="custom-interest-input"
              placeholder="Add your own interest…"
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addCustom()}
              maxLength={40}
            />
            <button
              className="custom-interest-add"
              onClick={addCustom}
              disabled={!inputVal.trim()}
              title="Add interest"
            >+</button>
          </div>
        </div>

        <div style={{ paddingTop: 28, paddingBottom: 48 }}>
          <button className="ob-primary-btn" disabled={selected.length < 3} onClick={() => onComplete(selected)}>
            Begin reading
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── FEEDS SCREEN ─────────────────────────────────────────────────────────────
function FeedsScreen({ interests, savedRss, onSaveRss }) {
  const allFeeds = (interests || []).flatMap(interest =>
    (INTEREST_FEEDS[interest] || []).map(f => ({ ...f, interest }))
  );
  const feeds = allFeeds.filter((f, i) => allFeeds.findIndex(x => x.id === f.id) === i);

  const [activeFeedId, setActiveFeedId] = React.useState(feeds[0]?.id || null);
  const activeFeed = feeds.find(f => f.id === activeFeedId);

  const grouped = {};
  for (const f of feeds) {
    (grouped[f.interest] = grouped[f.interest] || []).push(f);
  }

  if (feeds.length === 0) {
    return (
      <div className="scroll-area">
        <div style={{ maxWidth: 720, margin: '0 auto', padding: '48px 40px 80px' }}>
          <div className="view-label">Feeds</div>
          <div className="view-title">RSS Feeds</div>
          <div className="view-meta" style={{ marginTop: 32 }}>No feeds yet. Select interests to subscribe automatically.</div>
        </div>
      </div>
    );
  }

  return (
    <div className="feeds-layout">
      <aside className="feeds-sidebar">
        <div className="feeds-sidebar-head">
          <div className="feeds-sidebar-title">Feeds</div>
          <div className="feeds-sidebar-sub">{feeds.length} subscribed</div>
        </div>
        {Object.entries(grouped).map(([interest, fds]) => (
          <div key={interest} className="feed-group">
            <div className="feed-group-label">{interest}</div>
            {fds.map(f => (
              <button
                key={f.id}
                className={`feed-item ${activeFeedId === f.id ? 'active' : ''}`}
                onClick={() => setActiveFeedId(f.id)}
              >
                <span className="feed-item-dot" />
                {f.name}
              </button>
            ))}
          </div>
        ))}
        <button className="feed-add-btn">+ Add feed by URL</button>
      </aside>

      <div className="feeds-main">
        {activeFeed && (
          <div className="feeds-main-inner">
            <div className="view-label">{activeFeed.interest}</div>
            <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.3px', color: '#E8E5DD', marginBottom: 4 }}>{activeFeed.name}</div>
            <div style={{ fontSize: 13, color: '#5E5B55', fontStyle: 'italic', marginBottom: 0 }}>{activeFeed.description} · {activeFeed.domain}</div>
            <div style={{ marginTop: 0 }}>
              {activeFeed.articles.map(article => {
                const isSaved = (savedRss || []).includes(article.id);
                return (
                  <div key={article.id} className="feed-article">
                    <div className="feed-article-title">{article.title}</div>
                    <div className="feed-article-excerpt">{article.excerpt}</div>
                    <div className="feed-article-meta">
                      <span>{article.author}</span>
                      <span>·</span>
                      <span>{article.minutes} min</span>
                    </div>
                    <button
                      className={`feed-article-save ${isSaved ? 'saved' : ''}`}
                      onClick={() => !isSaved && onSaveRss(article.id)}
                    >
                      {isSaved ? 'Saved to library' : 'Save to library'}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PARAGRAPH WITH HIGHLIGHTS ───────────────────────────────────────────────
function HighlightedParagraph({ text, articleHighlights }) {
  if (!articleHighlights || articleHighlights.length === 0) return <>{text}</>;

  const relevant = articleHighlights
    .filter(h => text.includes(h.text))
    .sort((a, b) => text.indexOf(a.text) - text.indexOf(b.text));

  if (relevant.length === 0) return <>{text}</>;

  const segments = [];
  let cursor = 0;
  for (const h of relevant) {
    const idx = text.indexOf(h.text, cursor);
    if (idx < 0) continue;
    if (idx > cursor) segments.push({ t: text.slice(cursor, idx), h: null });
    segments.push({ t: h.text, h });
    cursor = idx + h.text.length;
  }
  if (cursor < text.length) segments.push({ t: text.slice(cursor), h: null });

  return (
    <>
      {segments.map((seg, i) =>
        seg.h ? (
          <mark key={i} className={`hl-${seg.h.color}`}>
            {seg.t}
            {seg.h.note && <span className="hl-note-dot" />}
          </mark>
        ) : (
          <React.Fragment key={i}>{seg.t}</React.Fragment>
        )
      )}
    </>
  );
}

// ─── READER SCREEN ───────────────────────────────────────────────────────────
function ReaderScreen({ articleId, onBack, highlights, onAddHighlight, progress, setProgress }) {
  const article = ARTICLES.find(a => a.id === articleId);
  const articleHighlights = highlights.filter(h => h.articleId === articleId);
  const contentRef = React.useRef(null);
  const scrollRef = React.useRef(null);
  const [scrollPct, setScrollPct] = React.useState(progress[articleId] || 0);
  const [showSettings, setShowSettings] = React.useState(false);
  const [fontSize, setFontSize] = React.useState(19);
  const [lineHeight, setLineHeight] = React.useState(1.78);
  const [pendingHighlight, setPendingHighlight] = React.useState(null);
  const [showNotePanel, setShowNotePanel] = React.useState(false);
  const [sel, setSel] = useTextSelection(contentRef, !showNotePanel);

  // Track progress
  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const onScroll = () => {
      const max = el.scrollHeight - el.clientHeight;
      const pct = max > 0 ? el.scrollTop / max : 0;
      setScrollPct(pct);
      setProgress(prev => ({ ...prev, [articleId]: Math.max(pct, prev[articleId] || 0) }));
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, [articleId, setProgress]);

  // Close settings on outside click
  React.useEffect(() => {
    if (!showSettings) return;
    const fn = (e) => { if (!e.target.closest('[data-toolbar]') && !e.target.closest('.icon-btn')) setShowSettings(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [showSettings]);

  const handleHighlight = (color) => {
    if (!sel) return;
    const article_obj = ARTICLES.find(a => a.id === articleId);
    const newHl = {
      id: Math.random().toString(36).slice(2, 10),
      articleId,
      text: sel.text,
      color,
      note: '',
      createdAt: Date.now(),
      topic: article_obj?.topics?.[0] || 'General',
    };
    onAddHighlight(newHl);
    setSel(null);
    window.getSelection()?.removeAllRanges();
  };

  const handleNoteOpen = () => {
    if (!sel) return;
    const article_obj = ARTICLES.find(a => a.id === articleId);
    setPendingHighlight({
      id: Math.random().toString(36).slice(2, 10),
      articleId,
      text: sel.text,
      color: 'ochre',
      note: '',
      createdAt: Date.now(),
      topic: article_obj?.topics?.[0] || 'General',
    });
    setSel(null);
    window.getSelection()?.removeAllRanges();
    setShowNotePanel(true);
  };

  const handleNoteSave = (hl) => {
    onAddHighlight(hl);
    setPendingHighlight(null);
    setShowNotePanel(false);
  };

  if (!article) return null;

  return (
    <div style={{ display: 'flex', flex: 1, overflow: 'hidden', position: 'relative' }}>
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {/* Top bar */}
        <div className="reader-topbar">
          <button className="reader-topbar-back" onClick={onBack}>
            <Icon name="chevLeft" size={16} />
            Library
          </button>
          <span className="reader-pub">{article.publication}</span>
          <div className="reader-topbar-actions">
            <button
              className={`icon-btn ${showSettings ? 'active' : ''}`}
              onClick={() => setShowSettings(s => !s)}
              data-toolbar="1"
              title="Reader settings"
            >
              <Icon name="aA" size={18} />
            </button>
            <button className="icon-btn" title="Bookmark">
              <Icon name="bookmark" size={16} />
            </button>
          </div>
        </div>

        {/* Progress bar */}
        <div className="reader-progress-bar">
          <div className="reader-progress-fill" style={{ width: `${scrollPct * 100}%` }} />
        </div>

        {/* Article body */}
        <div className="scroll-area" ref={scrollRef}>
          <div className="reader-col" ref={contentRef}>
            <h1 className="article-h1">{article.title}</h1>
            <div className="article-byline">
              <div className="article-byline-name">by {article.author}</div>
              <div className="article-byline-meta">
                <span>{article.publication}</span>
                <span className="article-byline-dot" />
                <span>{article.date}</span>
                <span className="article-byline-dot" />
                <span>{article.minutes} min read</span>
              </div>
              <div className="article-ornament">
                <div className="article-ornament-line" />
                <span className="article-ornament-glyph">§</span>
                <div className="article-ornament-line" />
              </div>
            </div>

            {article.body.map((block, i) => {
              if (block.kind === 'h2') return <h2 key={i} className="article-h2">{block.text}</h2>;
              if (block.kind === 'p') {
                const paraHls = articleHighlights.filter(h => block.text.includes(h.text));
                const noteHls = paraHls.filter(h => h.note);
                return (
                  <React.Fragment key={i}>
                    <p
                      className="article-p"
                      style={{ fontSize, lineHeight }}
                    >
                      <HighlightedParagraph text={block.text} articleHighlights={articleHighlights} />
                    </p>
                    {noteHls.map(h => (
                      <div key={h.id} className="inline-note" style={{ borderLeftColor: HL_COLORS[h.color]?.line }}>
                        <span className="inline-note-label" style={{ color: HL_COLORS[h.color]?.line }}>Note</span>
                        <span>{h.note}</span>
                      </div>
                    ))}
                  </React.Fragment>
                );
              }
              return null;
            })}

            <div className="article-end">* * *</div>
            <div className="article-source">Saved from {article.domain} · {article.saved}</div>
          </div>
        </div>
      </div>

      {/* Selection toolbar */}
      {sel && !showNotePanel && (
        <SelectionToolbar
          sel={sel}
          onHighlight={handleHighlight}
          onNote={handleNoteOpen}
          onClose={() => { setSel(null); window.getSelection()?.removeAllRanges(); }}
        />
      )}

      {/* Settings panel */}
      {showSettings && (
        <ReaderSettings
          fontSize={fontSize} setFontSize={setFontSize}
          lineHeight={lineHeight} setLineHeight={setLineHeight}
          onClose={() => setShowSettings(false)}
        />
      )}

      {/* Note panel */}
      {showNotePanel && pendingHighlight && (
        <NotePanel
          pendingHighlight={pendingHighlight}
          articleTopics={article.topics}
          onSave={handleNoteSave}
          onCancel={() => { setPendingHighlight(null); setShowNotePanel(false); }}
        />
      )}
    </div>
  );
}

// ─── MARGINALIA SCREEN ───────────────────────────────────────────────────────
function MarginaliScreen({ highlights, onOpen }) {
  const [filter, setFilter] = React.useState('All');
  const topics = ['All', ...Array.from(new Set(highlights.map(h => h.topic).filter(Boolean)))];

  const grouped = {};
  const visible = filter === 'All' ? highlights : highlights.filter(h => h.topic === filter);
  for (const h of visible) {
    (grouped[h.topic] = grouped[h.topic] || []).push(h);
  }

  const formatWhen = (ts) => {
    const diff = Date.now() - ts;
    if (diff < 86400000) return 'Today';
    if (diff < 172800000) return 'Yesterday';
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

  return (
    <div className="scroll-area">
      <div className="marginalia-inner">
        <div className="view-label">Notes</div>
        <div className="view-title">Marginalia</div>
        <div className="view-meta">{highlights.length} highlights · {highlights.filter(h => h.note).length} with notes</div>

        <div className="topic-filter">
          {topics.map(t => (
            <button
              key={t}
              className={`topic-chip ${filter === t ? 'active' : ''}`}
              onClick={() => setFilter(t)}
            >{t}</button>
          ))}
        </div>

        {highlights.length === 0 && (
          <div style={{ textAlign: 'center', padding: '60px 0', color: '#3D3A35', fontSize: 16, fontStyle: 'italic' }}>
            Select text in the reader to create your first highlight.
          </div>
        )}

        {Object.entries(grouped).map(([topic, hls]) => (
          <div key={topic} className="topic-group">
            <div className="topic-group-header">
              <span className="topic-group-label">{topic}</span>
              <span className="topic-group-line" />
              <span className="topic-group-count">{hls.length}</span>
            </div>
            {hls.map(h => {
              const article = ARTICLES.find(a => a.id === h.articleId);
              const line = HL_COLORS[h.color]?.line || '#C9A876';
              return (
                <button
                  key={h.id}
                  className="hl-card"
                  style={{ borderLeftColor: line }}
                  onClick={() => onOpen(h.articleId)}
                >
                  <div className="hl-card-quote">
                    <span style={{ color: line, marginRight: 3 }}>"</span>
                    {h.text}
                    <span style={{ color: line, marginLeft: 2 }}>"</span>
                  </div>
                  {h.note && (
                    <div className="hl-card-note">
                      <span className="hl-card-note-label" style={{ color: '#C9A876' }}>Note</span>
                      {h.note}
                    </div>
                  )}
                  <div className="hl-card-footer">
                    <span className="hl-card-source">{article?.title}</span>
                    <span style={{ width: 3, height: 3, borderRadius: '50%', background: '#3D3A35', alignSelf: 'center' }} />
                    <span className="hl-card-when">{formatWhen(h.createdAt)}</span>
                  </div>
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        {state === 'success' ? (
          <div className="modal-success">
            <div className="modal-success-icon">§</div>
            <div className="modal-success-title">Article saved</div>
            <div className="modal-success-sub" style={{ marginBottom: 24 }}>It will appear in your library shortly.</div>
            <button className="modal-btn-primary" onClick={onClose}>Back to Library</button>
          </div>
        ) : (
          <>
            <div className="modal-title">Save an article</div>
            <div className="modal-subtitle">Paste a URL and Calma will fetch and clean the content for reading.</div>
            <div className="modal-label">Article URL</div>
            <input
              className="modal-input"
              placeholder="https://…"
              value={url}
              onChange={e => setUrl(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSave()}
              autoFocus
            />
            <div className="modal-actions">
              <button className="modal-btn-secondary" onClick={onClose}>Cancel</button>
              <button
                className="modal-btn-primary"
                onClick={handleSave}
                disabled={!url.trim() || state === 'loading'}
                style={{ opacity: !url.trim() || state === 'loading' ? 0.5 : 1 }}
              >
                {state === 'loading' ? 'Saving…' : 'Save article'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [onboarded, setOnboarded] = useLocalStorage('calma_onboarded', false);
  const [obStep, setObStep] = React.useState('welcome');
  const [interests, setInterests] = useLocalStorage('calma_interests', []);
  const [savedRss, setSavedRss] = useLocalStorage('calma_rss_saved', []);
  const [view, setView] = React.useState('library');
  const [openArticleId, setOpenArticleId] = React.useState(null);
  const [highlights, setHighlights] = useLocalStorage('calma_highlights', SEED_HIGHLIGHTS);
  const [progress, setProgress] = useLocalStorage('calma_progress', SEED_PROGRESS);
  const [showAdd, setShowAdd] = React.useState(false);

  // Onboarding gate
  if (!onboarded) {
    if (obStep === 'welcome') return <WelcomeScreen onNext={() => setObStep('interests')} />;
    return (
      <InterestsScreen
        onComplete={(selected) => {
          setInterests(selected);
          setOnboarded(true);
        }}
      />
    );
  }

  const openArticle = (id) => { setOpenArticleId(id); setView('library'); };
  const closeArticle = () => setOpenArticleId(null);

  const addHighlight = (hl) => setHighlights(prev => {
    const filtered = prev.filter(h => !(h.articleId === hl.articleId && h.text === hl.text));
    return [hl, ...filtered];
  });

  const saveRss = (articleId) => setSavedRss(prev => prev.includes(articleId) ? prev : [...prev, articleId]);

  // Keyboard shortcuts
  React.useEffect(() => {
    const fn = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape' && openArticleId) closeArticle();
      if (e.key === 'l' && !openArticleId) setView('library');
      if (e.key === 'm' && !openArticleId) setView('marginalia');
      if (e.key === 'd' && !openArticleId) setView('discover');
      if (e.key === 's' && !openArticleId) setView('search');
      if (e.key === 'n' && !openArticleId) setShowAdd(true);
    };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [openArticleId]);

  const renderMain = () => {
    if (openArticleId) {
      return (
        <ReaderScreen
          articleId={openArticleId}
          onBack={closeArticle}
          highlights={highlights}
          onAddHighlight={addHighlight}
          progress={progress}
          setProgress={setProgress}
        />
      );
    }
    switch (view) {
      case 'library':    return <LibraryScreen onOpen={openArticle} highlights={highlights} progress={progress} interests={interests} savedRss={savedRss} onSaveRss={saveRss} />;
      case 'discover':   return <DiscoverScreen interests={interests} savedRss={savedRss} onSaveRss={saveRss} />;
      case 'marginalia': return <MarginaliScreen highlights={highlights} onOpen={openArticle} />;
      case 'search':     return <SearchScreen highlights={highlights} onOpen={openArticle} />;
      default:           return null;
    }
  };

  return (
    <div className="app">
      <Sidebar view={openArticleId ? '__reader__' : view} setView={(v) => { setOpenArticleId(null); setView(v); }} onAdd={() => setShowAdd(true)} />
      <main className="main">
        {renderMain()}
      </main>
      <MobileNav view={openArticleId ? '__reader__' : view} setView={(v) => { setOpenArticleId(null); setView(v); }} />
      {showAdd && <AddArticleModal onClose={() => setShowAdd(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
