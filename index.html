<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="verde" data-display="serif" data-density="regular" data-layout="default">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Naama Mendes Jr. — Product Leader</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "verde",
  "display": "serif",
  "density": "regular",
  "layout": "default"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [openId, setOpenId] = useState("tapcheck-director");
  const data = window.PORTFOLIO_DATA;

  // Apply tweaks as data-* on <html>
  useEffect(() => {
    const html = document.documentElement;
    html.setAttribute("data-theme", t.theme);
    html.setAttribute("data-accent", t.accent);
    html.setAttribute("data-display", t.display);
    html.setAttribute("data-density", t.density);
    html.setAttribute("data-layout", t.layout);
  }, [t.theme, t.accent, t.display, t.density, t.layout]);

  // Scroll reveal
  useScrollReveal();

  const onToggleTheme = () =>
    setTweak("theme", t.theme === "dark" ? "light" : "dark");

  return (
    <div className="app">
      <Hero data={data} theme={t.theme} />

      <div data-reveal>
        <WorkList data={data} openId={openId} setOpenId={setOpenId} />
      </div>

      <div data-reveal>
        <About data={data} />
      </div>

      <div data-reveal>
        <Capabilities data={data} />
      </div>

      <div data-reveal>
        <Clients data={data} />
      </div>

      <div data-reveal>
        <Writing data={data} />
      </div>

      <Footer data={data} />

      <FloatingContact data={data} theme={t.theme} onToggleTheme={onToggleTheme} />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio
          label="Mode"
          value={t.theme}
          options={["light", "dark"]}
          onChange={(v) => setTweak("theme", v)}
        />
        <TweakSelect
          label="Accent"
          value={t.accent}
          options={["verde", "cobalt", "amarelo", "terracota", "rosa"]}
          onChange={(v) => setTweak("accent", v)}
        />

        <TweakSection label="Typography" />
        <TweakRadio
          label="Display"
          value={t.display}
          options={["serif", "grotesk"]}
          onChange={(v) => setTweak("display", v)}
        />

        <TweakSection label="Layout" />
        <TweakRadio
          label="Density"
          value={t.density}
          options={["compact", "regular", "comfy"]}
          onChange={(v) => setTweak("density", v)}
        />
        <TweakSelect
          label="Width"
          value={t.layout}
          options={["default", "centered", "wide"]}
          onChange={(v) => setTweak("layout", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>

</body>
</html>
